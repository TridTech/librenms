mib: DeltaUPS-MIB
modules:
    os:
        hardware:
            - DeltaUPS-MIB::dupsIdentManufacturer.0
            - DeltaUPS-MIB::dupsIdentModel.0
        hardware_template: '{{ DeltaUPS-MIB::dupsIdentManufacturer.0 }} {{ DeltaUPS-MIB::dupsIdentModel.0 }}'
        version: DeltaUPS-MIB::dupsIdentUPSSoftwareVersion.0
    sensors:
        temperature:
            data:
                -
                    oid: dupsEnvironment
                    value: dupsEnvTemperature
                    num_oid: '.1.3.6.1.4.1.2254.2.4.10.{{ $index }}'
                    descr: 'Environment'
                    index: '1'
                    skip_values:
                    -
                        oid: dupsEnvTemperature
                        op: '='
                        value: 0
